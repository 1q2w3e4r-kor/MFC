<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #faf8f4;
    font-family: 'Pretendard', sans-serif;
    color: #2b2b2b;
  }
  .wrap {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,.05);
  }
  .section { padding: 20px 18px; text-align: center; }

  .section2 {
    background-color: #e9e9e9;
    padding: 40px 20px;
    text-align: center;
  }

  .section2 h2 {
    font-size: 24px;
    margin-bottom: 5px;
    font-weight: 700;
  }

  .section2 .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 30px;
  }

  .profile-wrapper {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 15px;
    max-width: 800px;
    margin: 0 auto;
    text-align: left;
  }

  .profile-image img { width: 170px; height: auto; }
  .profile-text { flex: 1; max-width: 400px; }
  .profile-text h3 { font-size: 22px; font-weight:700; }
  .profile-text h4 { font-size: 14px; font-weight: 300; color: #333; }
  .profile-text p { font-size: 12px; line-height:1.4; color:#333; }

  .badge {
    display: inline-block;
    padding: 8px 20px;
    border: 2px solid #c9a86a;
    color: #c9a86a;
    border-radius: 30px;
    font-size: 16px;
    margin-bottom: 40px;
  }

  h1 { font-size: 34px; margin: 0; color:#153240; font-weight:400; }
  h2 { font-size: 32px; margin: 0; color:#153240; font-weight:800; }
  .lead { font-size: 14px; color:#666; margin:12px 0 24px; line-height:1.8; }

  img { max-width: 100%; height:auto; }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #888;
    padding: 20px;
  }

  .btn {
    display: inline-block;
    margin-top: 12px;
    padding: 14px 20px;
    background-color: #0e2a44;
    color: #C9A86A;
    text-decoration: none;
    font-weight: bold;
    border-radius: 999px;
  }
  .btn-outline {
    background: #fff;
    border: 1px solid #0e2a44;
    color: #0e2a44;
  }
  .button-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  /* 배경음악 버튼 */
  #bgm-toggle {
    position: fixed;
    right: 14px;
    bottom: 18px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: #0e2a44;
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
  }
  #bgm-toggle:active { transform: scale(0.95); }

  /* 초기 음악 재생 안내 오버레이 (선택사항) */
  #play-prompt {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  #play-prompt.hidden { display: none; }
  #play-prompt button {
    padding: 16px 32px;
    font-size: 18px;
    background: #C9A86A;
    color: #0e2a44;
    border: none;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
  }
  
</style>
  
</head>

  
<body>

<!-- 초기 재생 프롬프트 (선택사항) -->
<div id="play-prompt">
  <button id="start-music">🎵 배경음악과 함께 시작하기</button>
</div>

<div class="wrap">

  <section class="section">
    <span class="badge">INVITATION</span><br>
    <h1>봄봄축제</h1>
    <h2>VIP 초대장</h2>
    <p class="lead">따뜻한 봄날,<br>기쁨과 나눔이 가득한<br>특별한 주말을 준비했습니다.</p>
  </section>

  <!-- 배경음악 -->
  <audio id="bgm" preload="auto" loop playsinline>
    <source src="https://1q2w3e4r-kor.github.io/BOMBOM/BGM.mp3" type="audio/mpeg">
  </audio>
  <button id="bgm-toggle">🔇</button>

  <img src="1.png" alt="포스터" />
  <img src="2.png" alt="플리마켓1" />
  <img src="3.png" alt="플리마켓2" />
  <img src="4.png" alt="예배" />
  <video width="100%" controls style="display: block; margin: 10px 0;"><source src="5.mp4" type="video/mp4">Your browser does not support the video tag.</video>
  <section class="section2">
    <h2 style="font-size:28px;">강사 소개</h2>

    <div class="profile-wrapper">
      <div class="profile-image"><img src="nadeul_01.png" alt="강사 사진"></div>
      <div class="profile-text">
        <h3>나들 | 박영열 목사</h3>
        <h4>(엔터교회 담임)</h4>
        <p>
          90년대 중반, 앨범 '좋아좋아'로 큰 사랑을 받았던 '일기예보'의 보컬 '나들'로 활동하셨습니다.<br><br>
          '인형의 꿈', '그대만 있다면', '니가 좋아' 등 수많은 히트곡과 더불어
          복음송 작곡, 찬양사역, 간증사역으로 많은 은혜를 끼치고 계십니다.
        </p>
      </div>
    </div>
    <div class="profile-bottom-img">
      <img src="nadeul_02.png" alt="나들 목사와 찬양팀">
    </div>
  </section>

  <section class="section">
    <h2>오시는 길</h2>
    <br>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1334.2704130078628!2d126.99764259979858!3d37.30822065693434!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b5d2088a8b389%3A0xa5fa51f39567a883!2z7ISg6rWQ7KCc7J286rWQ7ZqM!5e0!3m2!1sko!2skr!4v1776862021378!5m2!1sko!2skr" 
      width="100%" height="240" style="border:0;" allowfullscreen loading="lazy"></iframe>

    <div class="button-group">
      <a class="btn" href="http://www.mf21.or.kr" target="_blank">교회 홈페이지 바로가기</a>
      <a class="btn btn-outline" href="tel:0312580660">문의 031-258-0660</a>
    </div>
  </section><br><br>

  <footer class="footer">
    <img src="logo.png" style="width:160px; margin:0 auto 10px;">
  </footer>

</div>

<script>
const audio = document.getElementById("bgm");
const btn = document.getElementById("bgm-toggle");
const playPrompt = document.getElementById("play-prompt");
const startBtn = document.getElementById("start-music");

let isPlaying = false;

// 디버깅용 콘솔 로그
console.log("스크립트 시작");
console.log("Audio 요소:", audio);
console.log("오디오 소스:", audio.src);

// 음악 재생 함수
function playMusic() {
  console.log("playMusic() 호출됨");
  
  if (!audio) {
    console.error("오디오 요소를 찾을 수 없습니다");
    return;
  }

  audio.volume = 0.7;
  
  const playPromise = audio.play();
  
  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        console.log("음악 재생 성공");
        isPlaying = true;
        btn.textContent = "🔊";
      })
      .catch(err => {
        console.error("음악 재생 실패:", err.message);
        isPlaying = false;
        btn.textContent = "🔇";
        alert("음악 재생 실패:\n" + err.message + "\n\n파일 경로를 확인해주세요.");
      });
  }
}

// 초기 재생 버튼
if (startBtn) {
  startBtn.addEventListener("click", () => {
    console.log("시작 버튼 클릭됨");
    playPrompt.classList.add("hidden");
    playMusic();
  });
} else {
  console.error("시작 버튼을 찾을 수 없습니다");
}

// 토글 버튼
if (btn) {
  btn.addEventListener("click", () => {
    console.log("토글 버튼 클릭됨, 현재 상태:", isPlaying);
    
    if (isPlaying) {
      audio.pause();
      btn.textContent = "🔇";
      isPlaying = false;
      console.log("음악 정지됨");
    } else {
      playMusic();
    }
  });
} else {
  console.error("토글 버튼을 찾을 수 없습니다");
}

// 페이지 로드 완료 후
window.addEventListener("load", () => {
  console.log("페이지 로드 완료");
  
  audio.play()
    .then(() => {
      console.log("자동재생 성공");
      playPrompt.classList.add("hidden");
      isPlaying = true;
      btn.textContent = "🔊";
    })
    .catch(() => {
      console.log("자동재생 실패 (정상) - 프롬프트 표시");
      playPrompt.classList.remove("hidden");
    });
});
</script>
</body>
